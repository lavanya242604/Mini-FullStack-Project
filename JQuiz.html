<!DOCTYPE html>
<html>
<head>
    <title>Java Quiz</title>
    <style>
        body {
            font-family: cursive, Times New Roman;
            padding: 30px;
            background-color: white;
        }
        h1 {
            color: darkgreen;
            text-align: center;
            font-size: 25px;
        }
        .question {
            margin-top: 30px;
        }
        ul {
            list-style: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 5px;
        }
        .button-container {
            margin-top: 30px;
            text-align: center;
        }
        .nav-button {
            padding: 10px 20px;
            margin: 0 10px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-button:hover {
            background-color: navy;
        }
        #score {
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            color: #FF6347;
        }
    </style>
</head>
<body>

    <h1>Test On Java</h1>

    <form id="quizForm">
        <!-- Question 1 -->
        <div class="question">
            <p>1. Which of these is a valid keyword in Java?</p>
            <ul>
                <li><label><input type="radio" name="q1" value="a"> include</label></li>
                <li><label><input type="radio" name="q1" value="b"> import</label></li>
                <li><label><input type="radio" name="q1" value="c"> define</label></li>
                <li><label><input type="radio" name="q1" value="d"> public_static</label></li>
            </ul>
        </div>

        <!-- Question 2 -->
        <div class="question">
            <p>2. What is the size of an int in Java?</p>
            <ul>
                <li><label><input type="radio" name="q2" value="a"> 4 bytes</label></li>
                <li><label><input type="radio" name="q2" value="b"> 2 bytes</label></li>
                <li><label><input type="radio" name="q2" value="c"> 8 bytes</label></li>
                <li><label><input type="radio" name="q2" value="d"> Depends on system</label></li>
            </ul>
        </div>

        <!-- Question 3 -->
        <div class="question">
            <p>3. Which method is the entry point for any Java program?</p>
            <ul>
                <li><label><input type="radio" name="q3" value="a"> start()</label></li>
                <li><label><input type="radio" name="q3" value="b"> run()</label></li>
                <li><label><input type="radio" name="q3" value="c"> init()</label></li>
                <li><label><input type="radio" name="q3" value="d"> main()</label></li>
            </ul>
        </div>

        <!-- Question 4 -->
        <div class="question">
            <p>4. Which of these is NOT a Java keyword?</p>
            <ul>
                <li><label><input type="radio" name="q4" value="a"> static</label></li>
                <li><label><input type="radio" name="q4" value="b"> Boolean</label></li>
                <li><label><input type="radio" name="q4" value="c"> void</label></li>
                <li><label><input type="radio" name="q4" value="d"> private</label></li>
            </ul>
        </div>

        <!-- Question 5 -->
        <div class="question">
            <p>5. Which of these data types is used to store decimal numbers in Java?</p>
            <ul>
                <li><label><input type="radio" name="q5" value="a"> char</label></li>
                <li><label><input type="radio" name="q5" value="b"> int</label></li>
                <li><label><input type="radio" name="q5" value="c"> float</label></li>
                <li><label><input type="radio" name="q5" value="d"> byte</label></li>
            </ul>
        </div>

        <!-- Score display -->
        <div id="score"></div>

        <!-- Bottom Buttons -->
        <div class="button-container">
            <a href="home.html" class="nav-button">Home</a>
            <button type="button" class="nav-button" onclick="calculateScore()">Submit Quiz</button>
        </div>
    </form>

    <script>
        function calculateScore() {
            let score = 0;
            const correctAnswers = {
                q1: "b",
                q2: "a",
                q3: "d",
                q4: "b",
                q5: "c"
            };

            for (let key in correctAnswers) {
                const selected = document.querySelector(`input[name="${key}"]:checked`);
                if (selected && selected.value === correctAnswers[key]) {
                    score++;
                }
            }

            document.getElementById("score").innerText = "Your Score: " + score + " / 5";
        }
    </script>

</body>
</html>
