<!DOCTYPE html>
<html>
<head>
    <title>HOME</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: darkblue;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        .round-img {
            height: 80px;  
            width: 80px;   
            border-radius: 50%;  
            object-fit: cover;  
            border: 2px solid white;  
        }
        /* Language List */
        .language-container {
            padding: 20px;
            font-weight: bold;  
        }

        .language-list {
            padding-left: 40px;
            width: 50%;
        }
        .language-list li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
            width: 100%;
        }
        .language-item {
            display: flex;
            justify-content: space-between;
            width: 100%;     
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
            min-width: 80px;
        }
        /* Contact and Feedback Section */
        .contact-container {
            display: flex;
            justify-content: space-between;
            background-color: navy;
            padding: 20px;
        }
        .contact, .feedback {
            width: 48%;
        }
        .contact h2 {
            margin-bottom: 10px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .contact-item label {
            width: 120px;
            text-align: right;
            margin-right: 10px;
            font-weight: bold;
        }
        .contact-item input {
            display: flex;
            padding: 5px;
        }
        .feedback textarea {
            width: 100%;
            height: 100px;
            padding: 5px;
        }
        /* Submit Button */
        .submit-container {
            text-align: center;
            padding: 20px;
        }
        .submit-button {
            background-color: darkblue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-button:hover {
            background-color: navy;
        }
    </style>
</head>
