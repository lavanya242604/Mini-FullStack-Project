<!DOCTYPE html>
<html>
<head>
    <title>About Languages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0073e6;
            color: white;
        }
        .header img {
            height: 50px;
        }
        .language-list li {
            display: flex;
            justify-content: space-between;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        .contact {
            background-color: #f1f1f1;
        }
        textarea {
            width: 100%;
            height: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="pic.png" alt="Picture">
        <h1>About Languages</h1>
        <img src="logo.png" alt="College Logo">
    </div>

    <ul class="language-list">
        <li>Python <button>Learn</button></li><br><br>
        <li>Java <button>Learn</button></li><br><br>
        <li>C++ <button>Learn</button></li><br><br>
        <li>JavaScript <button>Learn</button></li><br><br>
        <li>Datastructures <button>Learn</button></li><br><br>
    </ul>

    <div class="contact">
        <h2>Contact Details</h2>
        <p>Name: <input type="text"></p>
        <p>Email: <input type="email"></p>
        <p>Contact No: <input type="text"></p>
        <h3>Feedback</h3>
        <textarea placeholder="Enter your feedback"></textarea>
    </div>

</body>
</html>
